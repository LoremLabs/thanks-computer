target: dev

apps:
  api:
    path: ./APPS/api
    start: node server.js
    health: http://localhost:4100/health
  worker:
    path: ./APPS/worker
    start: node server.js
    health: http://localhost:9009/health

operations:
  HELLO:
    url: http://localhost:4100/words/hello
  WORLD:
    url: http://localhost:4100/words/world
  SORT:
    url: http://localhost:4100/sort
  RENDER:
    url: http://localhost:4100/render
  RESEARCH:
    url: http://localhost:9009/research

targets:
  dev:
    chassis: http://localhost:8081
    mock: allow

  # Sketch of a prod target — adapt the URLs and uncomment when you have
  # the corresponding services deployed.
  #
  # prod:
  #   chassis: https://prod.example.com:8081
  #   user: alice
  #   mock: deny
  #   operations:
  #     HELLO:
  #       url: https://api.prod.example.com/words/hello
  #     WORLD:
  #       url: https://api.prod.example.com/words/world
  #     SORT:
  #       url: https://api.prod.example.com/sort
  #     RENDER:
  #       url: https://api.prod.example.com/render
