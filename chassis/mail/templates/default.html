<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
  <head>
    <meta charset="utf-8" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>{{.Subject}}</title>
  </head>
  <body style="margin:0;padding:0;width:100%;background:#f5f6f8;[word-break:break-word];-webkit-font-smoothing:antialiased;">
    {{- if .Preheader}}
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{.Preheader}}</div>
    {{- end}}
    <div role="article" aria-roledescription="email" aria-label="{{.Subject}}" lang="en">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f6f8;">
        <tr>
          <td align="center" style="padding:24px;">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0"
              style="width:600px;max-width:100%;background:#ffffff;border-radius:8px;overflow:hidden;">
              <tr>
                <td style="padding:32px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.5;color:#1f2933;">
                  {{.Body}}
                </td>
              </tr>
            </table>
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:100%;">
              <tr>
                <td style="padding:16px 32px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.5;color:#9aa5b1;text-align:center;">
                  Sent by thanks.computer
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
