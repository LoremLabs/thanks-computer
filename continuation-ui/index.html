<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#06b6d4" />
        <meta name="robots" content="noindex" />
        <!-- No-JS fallback: reload the SAME url (?txc.continuation=<rcid>)
             every 3s. The server returns this waiting page while running
             and the rendered result once complete, so the loop ends on
             its own. Inside <noscript> so it never fights the JS poller. -->
        <noscript><meta http-equiv="refresh" content="3" /></noscript>
        <title>working…</title>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
